<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Odit - Tracking Auditor{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10/dist/ext/json-enc.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4ff; }
        .nav-link { color: rgba(255,255,255,0.72); transition: color 0.15s, background 0.15s; }
        .nav-link:hover { color: #fff; background: rgba(255,255,255,0.12); }
    </style>
</head>
<body class="min-h-screen text-gray-800">
    <nav class="sticky top-0 z-10" style="background:#1800ad; box-shadow:0 2px 12px rgba(24,0,173,0.28)">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-14">
                <a href="/" class="flex items-center gap-1.5">
                    <img src="/static/odit.svg" alt="Odit" class="h-7 w-auto" style="filter:brightness(0) invert(1)" />
                </a>
                <div class="flex items-center gap-0.5">
                    <a href="/" class="nav-link text-sm font-medium px-3 py-1.5 rounded-md">Audits</a>
                    <a href="/settings" class="nav-link text-sm font-medium px-3 py-1.5 rounded-md">Settings</a>
                    <a href="/audits/new"
                        class="inline-flex items-center gap-1.5 text-sm font-semibold px-3.5 py-1.5 rounded-lg transition-colors ml-2"
                        style="background:rgba(255,255,255,0.18); color:#fff; border:1px solid rgba(255,255,255,0.25)"
                        onmouseover="this.style.background='rgba(255,255,255,0.28)'"
                        onmouseout="this.style.background='rgba(255,255,255,0.18)'">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4" />
                        </svg>
                        New Audit
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="mt-16 py-5 text-center text-xs" style="color:rgba(24,0,173,0.35)">
        Odit &mdash; Local-first tracking auditor
    </footer>
</body>
</html>
