<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Odit - Tracking Auditor{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10/dist/ext/json-enc.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">
    <nav class="bg-white border-b border-gray-100 sticky top-0 z-10" style="box-shadow: 0 1px 3px rgba(24,0,173,0.06)">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-14">
                <a href="/" class="flex items-center gap-1.5 group">
                    <img src="/static/odit.svg" alt="Odit" class="h-7 w-auto" />
                </a>
                <div class="flex items-center gap-1">
                    <a href="/" class="text-sm text-gray-500 hover:text-gray-900 hover:bg-gray-50 px-3 py-1.5 rounded-md transition-colors">Audits</a>
                    <a href="/settings" class="text-sm text-gray-500 hover:text-gray-900 hover:bg-gray-50 px-3 py-1.5 rounded-md transition-colors">Settings</a>
                    <a href="/audits/new"
                        class="inline-flex items-center gap-1.5 text-white text-sm font-semibold px-3.5 py-1.5 rounded-lg transition-colors ml-2"
                        style="background:#1800ad"
                        onmouseover="this.style.background='#13008a'" onmouseout="this.style.background='#1800ad'">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4" />
                        </svg>
                        New Audit
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="mt-16 border-t border-gray-100 py-5 text-center text-xs text-gray-400">
        Odit &mdash; Local-first tracking auditor
    </footer>
</body>
</html>
