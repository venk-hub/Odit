<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Odit - Tracking Auditor{% endblock %}</title>
    <script>
        tailwind = { config: {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50:  '#f0eeff',
                            100: '#dddaff',
                            200: '#bbb5ff',
                            300: '#9088ff',
                            400: '#6355e0',
                            500: '#3820c4',
                            600: '#1800ad',
                            700: '#13008a',
                            800: '#0e0068',
                            900: '#080047',
                        }
                    }
                }
            }
        }}
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10/dist/ext/json-enc.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800">
    <nav class="bg-white border-b border-gray-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-14">
                <a href="/" class="flex items-center gap-2">
                    <img src="/static/odit.svg" alt="Odit" class="h-8 w-auto" />
                    <span class="text-sm text-gray-400 hidden sm:inline">Tracking Auditor</span>
                </a>
                <div class="flex items-center gap-3">
                    <a href="/" class="text-sm text-gray-600 hover:text-brand-600 transition-colors">Audits</a>
                    <a href="/settings" class="text-sm text-gray-600 hover:text-brand-600 transition-colors">Settings</a>
                    <a href="/audits/new"
                        class="inline-flex items-center gap-1.5 bg-brand-600 hover:bg-brand-700 text-white text-sm font-medium px-3 py-1.5 rounded-md transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                        New Audit
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        {% block content %}{% endblock %}
    </main>

    <footer class="mt-12 border-t border-gray-200 py-4 text-center text-xs text-gray-400">
        Odit v1.0 &mdash; Local-first tracking auditor
    </footer>
</body>
</html>
