vendors:
  - key: google_analytics
    name: "Google Analytics / GA4"
    category: analytics
    signatures:
      domains:
        - google-analytics.com
        - analytics.google.com
      script_patterns:
        - gtag/js
        - google-analytics.com/analytics.js
        - google-analytics.com/g/collect
        - googletagmanager.com/gtag/js
      window_globals:
        - gtag
        - dataLayer
        - ga
      cookie_patterns:
        - _ga
        - _gid
        - _gat

  - key: google_tag_manager
    name: "Google Tag Manager"
    category: tag_manager
    signatures:
      domains:
        - googletagmanager.com
      script_patterns:
        - googletagmanager.com/gtm.js
        - googletagmanager.com/ns.html
      window_globals:
        - google_tag_manager
        - dataLayer
      cookie_patterns:
        - _dc_gtm_

  - key: adobe_launch
    name: "Adobe Launch / Experience Platform Tags"
    category: tag_manager
    signatures:
      domains:
        - assets.adobedtm.com
        - launch-uat.adobe.io
      script_patterns:
        - assets.adobedtm.com
        - launch-
        - adobedtm.com
      window_globals:
        - _satellite
        - adobe
      cookie_patterns: []

  - key: adobe_analytics
    name: "Adobe Analytics"
    category: analytics
    signatures:
      domains:
        - omtrdc.net
        - sc.omtrdc.net
        - 2o7.net
      script_patterns:
        - omtrdc.net
        - AppMeasurement.js
        - AppMeasurement_Module
      window_globals:
        - s
        - s_gi
        - AppMeasurement
      cookie_patterns:
        - s_cc
        - s_sq
        - s_vi
        - s_fid

  - key: tealium
    name: "Tealium iQ / AudienceStream"
    category: tag_manager
    signatures:
      domains:
        - tags.tiqcdn.com
        - collect.tealiumiq.com
      script_patterns:
        - tags.tiqcdn.com
        - utag.js
        - utag.sync.js
      window_globals:
        - utag
        - utag_data
      cookie_patterns:
        - utag_main

  - key: segment
    name: "Segment"
    category: analytics
    signatures:
      domains:
        - cdn.segment.com
        - api.segment.io
        - cdn.segment.io
      script_patterns:
        - cdn.segment.com/analytics.js
        - cdn.segment.io/analytics.js
      window_globals:
        - analytics
        - AnalyticsBrowser
      cookie_patterns:
        - ajs_anonymous_id
        - ajs_user_id

  - key: rudderstack
    name: "RudderStack"
    category: analytics
    signatures:
      domains:
        - cdn.rudderlabs.com
        - dataplane.rudderstack.com
      script_patterns:
        - cdn.rudderlabs.com
        - rudderanalytics
      window_globals:
        - rudderanalytics
        - RudderAnalytics
      cookie_patterns:
        - rl_anonymous_id
        - rl_user_id

  - key: mixpanel
    name: "Mixpanel"
    category: analytics
    signatures:
      domains:
        - cdn.mxpnl.com
        - api.mixpanel.com
        - mixpanel.com
      script_patterns:
        - cdn.mxpnl.com/libs/mixpanel
        - mixpanel-2-latest.min.js
      window_globals:
        - mixpanel
      cookie_patterns:
        - mp_
        - __mp_opt_in_out_

  - key: amplitude
    name: "Amplitude"
    category: analytics
    signatures:
      domains:
        - cdn.amplitude.com
        - api.amplitude.com
        - api2.amplitude.com
      script_patterns:
        - cdn.amplitude.com/libs
        - amplitude.min.js
      window_globals:
        - amplitude
      cookie_patterns:
        - AMP_
        - amplitude_id

  - key: heap
    name: "Heap Analytics"
    category: analytics
    signatures:
      domains:
        - cdn.heapanalytics.com
        - heapanalytics.com
      script_patterns:
        - cdn.heapanalytics.com
        - heap-
      window_globals:
        - heap
      cookie_patterns:
        - _hp2_
        - heap_

  - key: meta_pixel
    name: "Meta Pixel (Facebook)"
    category: pixel
    signatures:
      domains:
        - connect.facebook.net
        - facebook.com/tr
      script_patterns:
        - connect.facebook.net/en_US/fbevents.js
        - connect.facebook.net/signals/fbevents.js
      window_globals:
        - fbq
        - _fbq
      cookie_patterns:
        - _fbp
        - _fbc

  - key: linkedin_insight
    name: "LinkedIn Insight Tag"
    category: pixel
    signatures:
