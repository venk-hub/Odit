      window_globals:
        - OneTrust
        - OnetrustActiveGroups
        - otStubData
      cookie_patterns:
        - OptanonConsent
        - OptanonAlertBoxClosed

  - key: cookiebot
    name: "Cookiebot"
    category: consent
    signatures:
